<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이력서</title>
    <style>
        body {
            font-family: 'Noto Sans KR', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 1rem 0;
            text-align: center;
        }
        main {
            max-width: 800px;
            width: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .download-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .download-btn:hover {
            background-color: #2980b9;
        }
        footer {
            margin-top: auto;
            width: 100%;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>내 이력서</h1>
    </header>
    
    <main>
        <p>아래에서 이력서를 확인하거나 다운로드할 수 있습니다.</p>
        
        <div class="pdf-container">
            <iframe src="resume.pdf" width="100%" height="100%" style="border: none;"></iframe>
        </div>
        
        <a href="김민상_이력서.pdf" download class="download-btn">PDF 다운로드</a>
    </main>
    
    <footer>
        <p>&copy; 2025 김민상. All rights reserved.</p>
    </footer>
</body>
</html>
